<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>95OK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="main-container" id="main-container">
    
    <!-- Header -->
    <div class="header">
      <h1>স্বাগতম</h1>
      <p id="header-text">Welcome Back</p>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="form-container">
      <p class="form-title">Please Sign in to continue.</p>
      
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••••••">
          <button class="eye-btn">👁</button>
        </div>
      </div>

      <label class="checkbox-label">
        <input type="checkbox" checked>
        <span>Remember me next time</span>
      </label>

      <button onclick="handleLogin()" class="submit-btn">Sign In</button>
    </div>

    <!-- Success Message -->
    <div id="success-screen" class="form-container hidden text-center">
      <div class="success-icon">🎉</div>
      <h2>Login Successful!</h2>
      <p>একটি সাকসেস SMS পাঠানো হয়েছে আপনার মোবাইলে।</p>
      <button onclick="goToRegister()" class="submit-btn bg-green-600 mt-6">Continue to Register</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="form-container hidden">
      <p class="form-title">উত্তোলনের জন্য সঠিক তথ্য প্রদান করুন .</p>
      
      <div class="input-group">
        <label>Username</label>
        <input type="text" placeholder="Enter username">
      </div>
      
      <div class="input-group">
        <label>(Bkash or Nagad) Number</label>
        <input type="tel" placeholder="01XXXXXXXXX">
      </div>

      <div class="input-group">
        <label> Withdraw Password</label>
        <input type="password" placeholder="Create password">
      </div>

      <button onclick="handleRegister()" class="submit-btn">Submit</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
